<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>voiceassist</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-border: #262a33;
    --fg: #e7e9ee;
    --fg-dim: #9aa0ad;
    --accent: #4f8cff;
    --user-bubble: #2a3140;
    --bot-bubble: #1f2a3e;
    --record: #e0464d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header .status {
    color: var(--fg-dim);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .empty {
    color: var(--fg-dim);
    text-align: center;
    padding: 80px 20px;
    font-size: 14px;
  }
  .turn {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 80%;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .user .bubble {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .bot .bubble {
    align-self: flex-start;
    background: var(--bot-bubble);
    border-bottom-left-radius: 4px;
  }
  .meta {
    font-size: 11px;
    color: var(--fg-dim);
    padding: 0 6px;
  }
  .user .meta { align-self: flex-end; }
  .bot .meta { align-self: flex-start; }

  footer {
    border-top: 1px solid var(--panel-border);
    padding: 18px 20px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  button.talk {
    width: 100%;
    max-width: 360px;
    padding: 16px 20px;
    border: none;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 80ms ease;
    touch-action: manipulation;
  }
  button.talk:hover:not(:disabled) { filter: brightness(1.05); }
  button.talk:disabled { opacity: 0.55; cursor: not-allowed; }
  button.talk.recording {
    background: var(--record);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224, 70, 77, 0.5); }
    50% { box-shadow: 0 0 0 12px rgba(224, 70, 77, 0); }
  }
  .hint {
    color: var(--fg-dim);
    font-size: 12px;
  }
  .err {
    color: #ff6b6b;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>
  <header>
    <h1>voiceassist</h1>
    <span class="status" id="status">ready</span>
  </header>
  <main id="log">
    <div class="empty" id="empty">Press the button below and say something in Russian.</div>
  </main>
  <footer>
    <button class="talk" id="talk">Press to talk</button>
    <div class="hint" id="hint">Click again to send</div>
    <div class="err" id="err"></div>
  </footer>

<script>
class WavRecorder {
  constructor(sampleRate = 16000) {
    this.targetRate = sampleRate;
    this.chunks = [];
  }
  async start() {
    this.stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
    });
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.source = this.ctx.createMediaStreamSource(this.stream);
    this.proc = this.ctx.createScriptProcessor(4096, 1, 1);
    this.chunks = [];
    this.proc.onaudioprocess = (e) => {
      this.chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    this.source.connect(this.proc);
    this.proc.connect(this.ctx.destination);
    this.captureRate = this.ctx.sampleRate;
  }
  async stop() {
    this.proc.disconnect();
    this.source.disconnect();
    this.stream.getTracks().forEach(t => t.stop());
    const rate = this.captureRate;
    await this.ctx.close();

    let total = 0;
    for (const c of this.chunks) total += c.length;
    const merged = new Float32Array(total);
    let off = 0;
    for (const c of this.chunks) { merged.set(c, off); off += c.length; }

    const resampled = this._resample(merged, rate, this.targetRate);
    return this._encodeWav(resampled, this.targetRate);
  }
  _resample(input, fromRate, toRate) {
    if (fromRate === toRate) return input;
    const ratio = fromRate / toRate;
    const outLen = Math.floor(input.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const idx = i * ratio;
      const i0 = Math.floor(idx);
      const i1 = Math.min(i0 + 1, input.length - 1);
      const frac = idx - i0;
      out[i] = input[i0] * (1 - frac) + input[i1] * frac;
    }
    return out;
  }
  _encodeWav(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buf);
    const writeStr = (offset, s) => {
      for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
    };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + samples.length * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);          // PCM
    view.setUint16(22, 1, true);          // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, samples.length * 2, true);
    let p = 44;
    for (let i = 0; i < samples.length; i++) {
      let s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      p += 2;
    }
    return new Blob([buf], { type: 'audio/wav' });
  }
}

const btn = document.getElementById('talk');
const statusEl = document.getElementById('status');
const errEl = document.getElementById('err');
const logEl = document.getElementById('log');
const emptyEl = document.getElementById('empty');
const hintEl = document.getElementById('hint');

let recorder = null;
let history = [];
let state = 'idle';   // idle | recording | sending | playing

function setStatus(s) { statusEl.textContent = s; }
function setError(msg) { errEl.textContent = msg || ''; }

function appendTurn(userText, botText) {
  if (emptyEl) emptyEl.remove();
  const wrap = document.createDocumentFragment();

  const u = document.createElement('div');
  u.className = 'turn user';
  u.innerHTML = `<div class="bubble"></div><div class="meta">you</div>`;
  u.querySelector('.bubble').textContent = userText;
  wrap.appendChild(u);

  const b = document.createElement('div');
  b.className = 'turn bot';
  b.innerHTML = `<div class="bubble"></div><div class="meta">assistant</div>`;
  b.querySelector('.bubble').textContent = botText;
  wrap.appendChild(b);

  logEl.appendChild(wrap);
  logEl.scrollTop = logEl.scrollHeight;
}

function setMode(mode) {
  state = mode;
  btn.classList.toggle('recording', mode === 'recording');
  if (mode === 'idle') {
    btn.disabled = false;
    btn.textContent = 'Press to talk';
    hintEl.textContent = 'Click to start';
    setStatus('ready');
  } else if (mode === 'recording') {
    btn.disabled = false;
    btn.textContent = 'Stop & send';
    hintEl.textContent = 'Click again to send';
    setStatus('listening');
  } else if (mode === 'sending') {
    btn.disabled = true;
    btn.textContent = 'Processing...';
    hintEl.textContent = '';
    setStatus('thinking');
  } else if (mode === 'playing') {
    btn.disabled = true;
    btn.textContent = 'Speaking...';
    hintEl.textContent = '';
    setStatus('speaking');
  }
}

async function startRecording() {
  setError('');
  try {
    recorder = new WavRecorder(16000);
    await recorder.start();
    setMode('recording');
  } catch (e) {
    setError('Mic permission denied: ' + (e.message || e));
    setMode('idle');
  }
}

async function stopAndSend() {
  let blob;
  try {
    blob = await recorder.stop();
  } catch (e) {
    setError('Recording failed: ' + (e.message || e));
    setMode('idle');
    return;
  }
  setMode('sending');

  const fd = new FormData();
  fd.append('audio', blob, 'turn.wav');
  fd.append('history', JSON.stringify(history));

  let resp;
  try {
    resp = await fetch('/api/turn', { method: 'POST', body: fd });
  } catch (e) {
    setError('Request failed: ' + (e.message || e));
    setMode('idle');
    return;
  }
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    setError(`Server ${resp.status}: ${text.slice(0, 200)}`);
    setMode('idle');
    return;
  }

  const transcript = decodeURIComponent(resp.headers.get('X-Transcript') || '');
  const reply = decodeURIComponent(resp.headers.get('X-Reply') || '');
  const updated = decodeURIComponent(resp.headers.get('X-History') || '');
  if (updated) {
    try { history = JSON.parse(updated); } catch (_) {}
  }
  appendTurn(transcript, reply);

  const wavBlob = await resp.blob();
  const url = URL.createObjectURL(wavBlob);
  const audio = new Audio(url);
  setMode('playing');
  audio.onended = () => { URL.revokeObjectURL(url); setMode('idle'); };
  audio.onerror = () => { URL.revokeObjectURL(url); setMode('idle'); };
  try { await audio.play(); } catch (e) { setMode('idle'); }
}

btn.addEventListener('click', () => {
  if (state === 'idle') startRecording();
  else if (state === 'recording') stopAndSend();
});

setMode('idle');
</script>
</body>
</html>
