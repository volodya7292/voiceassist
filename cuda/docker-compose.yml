# CUDA stack: only Ollama runs in Docker. The Whisper STT server runs
# natively in Python (servers/whisper_server.py with the faster-whisper
# backend + worker pool) so STT can scale across concurrent requests
# without restarting the container per workload.
#
# Requires nvidia-container-toolkit on the host. Boot via cuda/run.sh.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: voiceassist-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
