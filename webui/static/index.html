<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>voiceassist</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-border: #262a33;
    --fg: #e7e9ee;
    --fg-dim: #9aa0ad;
    --accent: #4f8cff;
    --user-bubble: #2a3140;
    --bot-bubble: #1f2a3e;
    --listening: #4f8cff;
    --speaking-user: #38c172;
    --thinking: #d4a017;
    --speaking-bot: #b66bff;
    --off: #3b4150;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    flex: 1;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--off);
    transition: background 200ms ease, box-shadow 200ms ease;
  }
  .dot.listening { background: var(--listening); box-shadow: 0 0 6px var(--listening); }
  .dot.user     { background: var(--speaking-user); box-shadow: 0 0 8px var(--speaking-user); animation: glow 0.8s ease-in-out infinite alternate; }
  .dot.thinking { background: var(--thinking); box-shadow: 0 0 6px var(--thinking); animation: glow 0.6s ease-in-out infinite alternate; }
  .dot.bot      { background: var(--speaking-bot); box-shadow: 0 0 8px var(--speaking-bot); animation: glow 0.8s ease-in-out infinite alternate; }
  @keyframes glow {
    from { opacity: 0.6; }
    to { opacity: 1.0; }
  }
  .label {
    color: var(--fg-dim);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    min-width: 80px;
    text-align: right;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .empty {
    color: var(--fg-dim);
    text-align: center;
    padding: 80px 20px;
    font-size: 14px;
  }
  .turn {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 80%;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .user .bubble {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .bot .bubble {
    align-self: flex-start;
    background: var(--bot-bubble);
    border-bottom-left-radius: 4px;
  }
  .meta {
    font-size: 11px;
    color: var(--fg-dim);
    padding: 0 6px;
  }
  .user .meta { align-self: flex-end; }
  .bot .meta  { align-self: flex-start; }

  footer {
    border-top: 1px solid var(--panel-border);
    padding: 16px 20px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  button.toggle {
    width: 100%;
    max-width: 360px;
    padding: 14px 20px;
    border: none;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 80ms ease, opacity 80ms ease;
  }
  button.toggle:disabled { opacity: 0.5; cursor: not-allowed; }
  button.toggle.on  { background: #e0464d; }
  .hint { color: var(--fg-dim); font-size: 12px; text-align: center; }
  .err  { color: #ff6b6b; font-size: 13px; text-align: center; min-height: 1em; }
</style>
</head>
<body>
  <header>
    <h1>voiceassist</h1>
    <div class="dot" id="dot"></div>
    <span class="label" id="label">off</span>
  </header>
  <main id="log">
    <div class="empty" id="empty">Click Start, then speak. The assistant can be interrupted mid-sentence — just start talking.</div>
  </main>
  <footer>
    <button class="toggle" id="toggle">Start</button>
    <div class="hint">Use headphones for clean barge-in.</div>
    <div class="err" id="err"></div>
  </footer>

<script>
const TTS_RATE = 24000;
const MIC_RATE = 16000;

const dot = document.getElementById('dot');
const label = document.getElementById('label');
const toggleBtn = document.getElementById('toggle');
const errEl = document.getElementById('err');
const logEl = document.getElementById('log');
const emptyEl = document.getElementById('empty');

function setIndicator(stateName, txt) {
  dot.className = 'dot ' + stateName;
  label.textContent = txt;
}
function setError(msg) { errEl.textContent = msg || ''; }

// ---------------------------------------------------------------------------
// Conversation log

let botBubble = null;

function ensureEmptyHidden() {
  if (emptyEl && emptyEl.parentNode) emptyEl.remove();
}

function newUserBubble(text) {
  ensureEmptyHidden();
  const wrap = document.createElement('div');
  wrap.className = 'turn user';
  wrap.innerHTML = `<div class="bubble"></div><div class="meta">you</div>`;
  wrap.querySelector('.bubble').textContent = text;
  logEl.appendChild(wrap);
  logEl.scrollTop = logEl.scrollHeight;
}

function appendBotChunk(text) {
  if (!botBubble) {
    ensureEmptyHidden();
    const wrap = document.createElement('div');
    wrap.className = 'turn bot';
    wrap.innerHTML = `<div class="bubble"></div><div class="meta">assistant</div>`;
    logEl.appendChild(wrap);
    botBubble = wrap.querySelector('.bubble');
  }
  botBubble.textContent += (botBubble.textContent ? ' ' : '') + text;
  logEl.scrollTop = logEl.scrollHeight;
}

// ---------------------------------------------------------------------------
// Audio playback queue with barge-in support

let playbackCtx = null;
let nextPlaybackTime = 0;
const scheduledSources = new Set();

function int16ToFloat32(buf) {
  const i16 = new Int16Array(buf);
  const f32 = new Float32Array(i16.length);
  for (let i = 0; i < i16.length; i++) {
    const s = i16[i];
    f32[i] = s < 0 ? s / 0x8000 : s / 0x7fff;
  }
  return f32;
}

function playPcm(buf) {
  if (!playbackCtx) return;
  const f32 = int16ToFloat32(buf);
  if (f32.length === 0) return;
  const audioBuf = playbackCtx.createBuffer(1, f32.length, TTS_RATE);
  audioBuf.copyToChannel(f32, 0);
  const src = playbackCtx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(playbackCtx.destination);

  const now = playbackCtx.currentTime;
  const startAt = Math.max(now + 0.02, nextPlaybackTime);
  src.start(startAt);
  const endAt = startAt + f32.length / TTS_RATE;
  nextPlaybackTime = endAt;
  scheduledSources.add(src);
  src.onended = () => scheduledSources.delete(src);
}

function flushPlayback() {
  for (const src of scheduledSources) {
    try { src.stop(); } catch (_) {}
    try { src.disconnect(); } catch (_) {}
  }
  scheduledSources.clear();
  nextPlaybackTime = playbackCtx ? playbackCtx.currentTime : 0;
}

// ---------------------------------------------------------------------------
// WebSocket session

let captureCtx = null;
let micStream = null;
let captureNode = null;
let ws = null;

async function startSession() {
  setError('');
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: MIC_RATE,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
    });
  } catch (e) {
    setError('Microphone permission denied: ' + (e.message || e));
    toggleBtn.classList.remove('on');
    toggleBtn.textContent = 'Start';
    setIndicator('', 'off');
    return;
  }

  captureCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: MIC_RATE });
  playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: TTS_RATE });
  nextPlaybackTime = 0;
  await captureCtx.audioWorklet.addModule('/static/capture-worklet.js');

  const source = captureCtx.createMediaStreamSource(micStream);
  captureNode = new AudioWorkletNode(captureCtx, 'capture-processor');
  source.connect(captureNode);
  // Intentionally not connecting captureNode -> destination (don't echo mic to speakers).

  const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setIndicator('listening', 'listening');
    captureNode.port.onmessage = (e) => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
    };
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handleControl(msg);
    } else {
      playPcm(e.data);
    }
  };

  ws.onerror = () => setError('WebSocket error');
  ws.onclose = () => {
    if (toggleBtn.classList.contains('on')) {
      setError('Connection closed');
      stopSession();
    }
  };
}

function handleControl(msg) {
  switch (msg.type) {
    case 'user_speaking':
      if (msg.value) {
        setIndicator('user', 'you...');
        botBubble = null;  // start a fresh bot bubble for the upcoming reply
      } else {
        setIndicator('thinking', 'thinking');
      }
      break;
    case 'bot_speaking':
      if (msg.value) {
        setIndicator('bot', 'speaking');
      } else {
        setIndicator('listening', 'listening');
      }
      break;
    case 'transcript':
      newUserBubble(msg.text);
      setIndicator('thinking', 'thinking');
      break;
    case 'reply_chunk':
      appendBotChunk(msg.text);
      break;
    case 'interruption':
      // Server-side barge-in fired: drop any audio still in our queue
      // so the user's new turn isn't competing with the bot's tail.
      flushPlayback();
      break;
    case 'error':
      setError(msg.text || 'server error');
      break;
  }
}

async function stopSession() {
  setIndicator('', 'off');
  try { if (ws) ws.close(); } catch (_) {}
  ws = null;
  flushPlayback();
  if (captureNode) { try { captureNode.disconnect(); } catch (_) {} captureNode = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (captureCtx) { try { await captureCtx.close(); } catch (_) {} captureCtx = null; }
  if (playbackCtx) { try { await playbackCtx.close(); } catch (_) {} playbackCtx = null; }
  nextPlaybackTime = 0;
  botBubble = null;
}

toggleBtn.addEventListener('click', async () => {
  if (toggleBtn.classList.contains('on')) {
    toggleBtn.classList.remove('on');
    toggleBtn.textContent = 'Start';
    await stopSession();
  } else {
    toggleBtn.classList.add('on');
    toggleBtn.textContent = 'Stop';
    await startSession();
  }
});

setIndicator('', 'off');
</script>
</body>
</html>
