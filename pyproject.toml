[project]
name = "voiceassist"
version = "0.1.0"
description = "Local voice assistant: distil-whisper-large-v3 + gemma3:4b + Kokoro-82M on Apple Silicon"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pipecat-ai[silero,openai,local]>=0.0.55",
    "mlx-whisper>=0.4.1",
    "mlx-audio>=0.2.0",
    "misaki[en]>=0.7.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.12",
    "sounddevice>=0.5",
    "soundfile>=0.12",
    "numpy>=1.26",
    "httpx>=0.27",
    "torchaudio>=2.11.0",
]

[tool.uv]
package = false
