[project]
name = "voiceassist"
version = "0.1.0"
description = "Local voice assistant: whisper-large-v3-turbo + gemma3:4b + Silero v5_4_ru"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pipecat-ai[silero,openai,local]>=0.0.55",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.12",
    "sounddevice>=0.5",
    "soundfile>=0.12",
    "numpy>=1.26",
    "httpx>=0.27",
    "torchaudio>=2.11.0",

    # Apple Silicon-only: MLX backend for the local Whisper server.
    # On Linux/CUDA hosts use the Dockerized faster-whisper-server instead.
    "mlx-whisper>=0.4.1; sys_platform == 'darwin'",
]

[tool.uv]
package = false
